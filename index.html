// ================================================================
//  LOFT — persistent drawing plane from 2+ selected strokes
//  _loftGeo persists in memory for the session.
//  Cycle to 'loft' surf type to reactivate; tap ⟁ Loft again to rebuild.
//  Tap 'Lft' in surf cycle while already on loft → clears _loftGeo.
//  Cleared on newScene(). Serialises as 'plane' on save (ephemeral by design).
// ================================================================
(function(){
  // Stored loft geometry + centroid — persists until newScene() or explicit clear
  window._loftGeo = null;
  window._loftCen = null;

  // Resample a stroke's world-space points to N evenly-spaced samples
  function resampleStroke(stroke, N){
    var wpts = stroke.pts.map(function(p){return p.clone().applyMatrix4(stroke.mesh.matrix);});
    if(wpts.length < 2) return null;
    var lens = [0];
    for(var i = 1; i < wpts.length; i++) lens.push(lens[i-1] + wpts[i].distanceTo(wpts[i-1]));
    var total = lens[lens.length-1];
    if(total < 1e-6) return null;
    var result = [];
    for(var s = 0; s < N; s++){
      var t = s / (N-1) * total;
      var lo = 0, hi = lens.length-2;
      while(lo < hi){ var mid = (lo+hi)>>1; if(lens[mid+1] < t) lo=mid+1; else hi=mid; }
      var seg = lo;
      var segLen = lens[seg+1] - lens[seg];
      var alpha = segLen < 1e-10 ? 0 : (t - lens[seg]) / segLen;
      result.push(wpts[seg].clone().lerp(wpts[seg+1], alpha));
    }
    return result;
  }

  function buildLoftGeo(rails, N){
    var M = rails.length;
    var pos = [], norms = [], idx = [];
    for(var ri = 0; ri < M; ri++){
      for(var pi = 0; pi < N; pi++){
        var p = rails[ri][pi];
        pos.push(p.x, p.y, p.z);
        norms.push(0, 1, 0);
      }
    }
    for(var ri = 0; ri < M-1; ri++){
      for(var pi = 0; pi < N-1; pi++){
        var a = ri*N + pi;
        var b = ri*N + pi+1;
        var c = (ri+1)*N + pi;
        var d = (ri+1)*N + pi+1;
        idx.push(a, b, c,  b, d, c);
      }
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    return geo;
  }

  // Apply stored _loftGeo to the active surfGroup
  window._activateLoft = function(){
    if(!window._loftGeo || !window._loftCen){ toast('No loft — select 2+ strokes → ⟁ Loft'); return; }
    var geo = window._loftGeo;
    var cen = window._loftCen;
    surfPos.copy(cen);
    surfEuler.set(0,0,0);
    surfScale = 1;
    surfScaleAxes.set(1,1,1);
    surfType = 'plane';
    curPlane = 'xz';
    buildSurf();
    if(surfMesh && surfMesh.geometry){ surfMesh.geometry.dispose(); surfMesh.geometry = geo.clone(); }
    if(_frostedMesh && _frostedMesh.geometry){ _frostedMesh.geometry.dispose(); _frostedMesh.geometry = geo.clone(); }
    if(_frostedGridMesh && _frostedGridMesh.geometry){ _frostedGridMesh.geometry.dispose(); _frostedGridMesh.geometry = geo.clone(); }
    surfType = 'loft';
    surfGroup.visible = true;
    surfGroup.position.copy(surfPos);
    surfGroup.rotation.copy(new THREE.Euler(0,0,0));
    surfGroup.scale.set(1,1,1);
    // Sync all surf cycle buttons
    ['pb-cyc-surf','pb-cyc-surf2','sb-cyc-surf'].forEach(function(id){
      var b=document.getElementById(id);if(b)b.textContent='Lft';
    });
    var bsurf=document.getElementById('bsurf');if(bsurf)bsurf.classList.add('on');
    markDirty();
    setMode('draw');
  };

  // Clear the stored loft and fall back to none
  window._clearLoft = function(){
    if(window._loftGeo){ window._loftGeo.dispose(); window._loftGeo=null; }
    window._loftCen = null;
    surfGroup.visible = false;
    surfType = 'none';
    ['pb-cyc-surf','pb-cyc-surf2','sb-cyc-surf'].forEach(function(id){
      var b=document.getElementById(id);if(b)b.textContent='Off';
    });
    var bsurf=document.getElementById('bsurf');if(bsurf)bsurf.classList.remove('on');
    markDirty();
    setMode('select');
    toast('Loft cleared · select strokes to build new loft');
  };

  function loftFromSelection(){
    if(selectedStrokes.length < 2){ toast('Select 2+ strokes to loft'); return; }
    var N = 48;
    var rails = [];
    for(var i = 0; i < selectedStrokes.length; i++){
      var r = resampleStroke(selectedStrokes[i], N);
      if(!r){ toast('Stroke too short to loft'); return; }
      rails.push(r);
    }

    var cen = new THREE.Vector3();
    var total = 0;
    rails.forEach(function(r){ r.forEach(function(p){ cen.add(p); total++; }); });
    cen.divideScalar(total);

    var geo = buildLoftGeo(rails, N);
    var posArr = geo.attributes.position.array;
    for(var i = 0; i < posArr.length; i+=3){
      posArr[i]   -= cen.x;
      posArr[i+1] -= cen.y;
      posArr[i+2] -= cen.z;
    }
    geo.attributes.position.needsUpdate = true;
    geo.computeVertexNormals();

    // Dispose old stored geo if present
    if(window._loftGeo){ window._loftGeo.dispose(); }
    window._loftGeo = geo;
    window._loftCen = cen.clone();

    // Activate immediately
    window._activateLoft();
    clearSelection();
    toast('Loft built · draw on it · cycle Lft again to clear');
  }

  // sg-loft button: build from selection
  document.getElementById('sg-loft').addEventListener('click', function(){
    // If already on loft with a stored geo, tapping again clears it
    if(surfType === 'loft' && selectedStrokes.length === 0 && window._loftGeo){
      window._clearLoft();
    } else {
      loftFromSelection();
    }
  });
})();


// ================================================================
//  NAVCUBE — XYZ axis orientation gizmo (Blender-style)
//  Three coloured arms from centre, label dots at tips.
//  Tap a tip dot to snap to that view. Drag to orbit.
// ================================================================
(function(){
  // Axis definitions: world direction, snap config, colour, label
  const AXES=[
    {dir:[1,0,0],  col:'#e03040',lbl:'X', snap:{phi:Math.PI/2,theta:Math.PI},       neg:{phi:Math.PI/2,theta:0}},
    {dir:[-1,0,0], col:'#e03040',lbl:'-X',snap:{phi:Math.PI/2,theta:0},              neg:{phi:Math.PI/2,theta:Math.PI}},
    {dir:[0,1,0],  col:'#22bb55',lbl:'Y', snap:{phi:Math.PI/2,theta:Math.PI/2},     neg:{phi:Math.PI/2,theta:-Math.PI/2}},
    {dir:[0,-1,0], col:'#22bb55',lbl:'-Y',snap:{phi:Math.PI/2,theta:-Math.PI/2},    neg:{phi:Math.PI/2,theta:Math.PI/2}},
    {dir:[0,0,1],  col:'#3377ee',lbl:'Z', snap:{phi:0.001,theta:-Math.PI/2},         neg:{phi:Math.PI-0.001,theta:-Math.PI/2}},
    {dir:[0,0,-1], col:'#3377ee',lbl:'-Z',snap:{phi:Math.PI-0.001,theta:-Math.PI/2}, neg:{phi:0.001,theta:-Math.PI/2}},
  ];
  const LABELS_MAP={
    'X':'RGT','-X':'LFT','Y':'BCK','-Y':'FRT','Z':'TOP','-Z':'BTM'
  };

  function setupNavCube(nc,W,H){
    const ctx=nc.getContext('2d'),CX=W/2,CY=H/2;
    const ARM=Math.min(W,H)*0.37; // arm length in canvas px
    const DOT=Math.min(W,H)*0.10; // dot radius
    let ncDrag=null,ncLastTap=0,hovAxis=null;

    // Project a 3D world direction vector to 2D canvas coords
    function projectDir(dx,dy,dz){
      // Build camera right/up from spherical cam state
      const sinPhi=Math.sin(cam.phi),cosPhi=Math.cos(cam.phi);
      const sinTheta=Math.sin(cam.theta),cosTheta=Math.cos(cam.theta);
      // Camera right (theta+PI/2 in azimuth, phi=PI/2)
      const rx=-sinTheta, ry=cosTheta, rz=0;
      // Camera up: cross(right, -fwd)
      // fwd = (sinPhi*cosTheta, sinPhi*sinTheta, cosPhi)
      const fx=sinPhi*cosTheta,fy=sinPhi*sinTheta,fz=cosPhi;
      // up = fwd × right
      const ux=fy*rz-fz*ry, uy=fz*rx-fx*rz, uz=fx*ry-fy*rx;
      // Project d onto right and up
      const cx2=dx*rx+dy*ry+dz*rz;
      const cy2=dx*ux+dy*uy+dz*uz;
      return{x:CX+cx2*ARM, y:CY-cy2*ARM};
    }

    // Find which axis tip was hit (returns axis index or -1)
    function hitAxis(mx,my){
      let best=-1,bestD=Infinity;
      AXES.forEach((ax,i)=>{
        const p=projectDir(ax.dir[0],ax.dir[1],ax.dir[2]);
        const d=Math.hypot(mx-p.x,my-p.y);
        if(d<DOT*2.2&&d<bestD){bestD=d;best=i;}
      });
      return best;
    }

    function snapTo(axIdx){
      const ax=AXES[axIdx];
      cam.phi=ax.snap.phi; cam.theta=ax.snap.theta;
      updCam();toast(LABELS_MAP[ax.lbl]||ax.lbl);
    }

    function draw(){
      ctx.clearRect(0,0,W,H);
      // Draw arms back-to-front by Z depth
      const projected=AXES.map((ax,i)=>{
        const p=projectDir(ax.dir[0],ax.dir[1],ax.dir[2]);
        const depth=ax.dir[0]*Math.sin(cam.phi)*Math.cos(cam.theta)+
                    ax.dir[1]*Math.sin(cam.phi)*Math.sin(cam.theta)+
                    ax.dir[2]*Math.cos(cam.phi);
        return{ax,i,p,depth};
      }).sort((a,b)=>a.depth-b.depth);// back first

      // Draw background circle
      ctx.save();
      ctx.strokeStyle='rgba(26,26,46,.08)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(CX,CY,Math.min(W,H)/2-1,0,Math.PI*2);ctx.stroke();
      ctx.restore();

      // Draw each arm
      projected.forEach(({ax,i,p,depth})=>{
        const isFront=depth>=-0.01;
        const isHov=hovAxis===i;
        const alpha=isFront?(isHov?1:.85):(isHov?.55:.28);
        const col=ax.col;
        const dotR=DOT*(isFront?1:.7);

        ctx.save();
        // Arm line from centre
        ctx.strokeStyle=col;ctx.lineWidth=isFront?2:1.2;ctx.globalAlpha=alpha*0.7;
        ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(p.x,p.y);ctx.stroke();

        // Dot at tip
        ctx.globalAlpha=alpha;
        ctx.fillStyle=isFront?(isHov?col:col):'rgba(26,26,46,.2)';
        ctx.beginPath();ctx.arc(p.x,p.y,dotR,0,Math.PI*2);ctx.fill();
        if(isFront&&isHov){
          ctx.strokeStyle='#fff';ctx.lineWidth=1.2;ctx.globalAlpha=.7;
          ctx.beginPath();ctx.arc(p.x,p.y,dotR,0,Math.PI*2);ctx.stroke();
        }

        // Label (only on front-facing)
        if(isFront){
          ctx.globalAlpha=isHov?1:.75;
          ctx.fillStyle=isHov?'#fff':col;
          ctx.font=(isHov?'600 ':'')+(dotR>6?'7px':'6px')+' DM Mono,monospace';
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(ax.lbl,p.x,p.y+.5);
        }
        ctx.restore();
      });

      // Centre dot
      ctx.save();ctx.fillStyle='rgba(26,26,46,.25)';
      ctx.beginPath();ctx.arc(CX,CY,2.5,0,Math.PI*2);ctx.fill();ctx.restore();
    }

    function getPos(e){const r=nc.getBoundingClientRect(),src=e.touches&&e.touches.length>0?e.touches[0]:e.changedTouches&&e.changedTouches.length>0?e.changedTouches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};}

    nc.addEventListener('mousedown',e=>{e.stopPropagation();const p=getPos(e);ncDrag={sx:p.x,sy:p.y,st:cam.theta,sp:cam.phi,moved:false};});
    nc.addEventListener('mousemove',e=>{
      const p=getPos(e);
      const h=ncDrag?-1:hitAxis(p.x,p.y);
      if(!ncDrag&&h!==hovAxis){hovAxis=h;draw();}
      if(!ncDrag)return;
      const dx=p.x-ncDrag.sx,dy=p.y-ncDrag.sy;
      if(Math.hypot(dx,dy)>4)ncDrag.moved=true;
      if(ncDrag.moved){cam.theta=ncDrag.st+dx*.022;cam.phi=Math.max(.05,Math.min(Math.PI-.05,ncDrag.sp-dy*.022));updCam();draw();}
    });
    nc.addEventListener('mouseup',e=>{
      if(!ncDrag)return;
      if(!ncDrag.moved){const p=getPos(e);const h=hitAxis(p.x,p.y);if(h>-1)snapTo(h);}
      ncDrag=null;draw();
    });
    nc.addEventListener('mouseleave',()=>{hovAxis=null;ncDrag=null;draw();});
    nc.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();const p=getPos(e);ncDrag={sx:p.x,sy:p.y,st:cam.theta,sp:cam.phi,moved:false};},{passive:false});
    nc.addEventListener('touchmove',e=>{e.preventDefault();e.stopPropagation();if(!ncDrag)return;const p=getPos(e);const dx=p.x-ncDrag.sx,dy=p.y-ncDrag.sy;if(Math.hypot(dx,dy)>4)ncDrag.moved=true;if(ncDrag.moved){cam.theta=ncDrag.st+dx*.022;cam.phi=Math.max(.05,Math.min(Math.PI-.05,ncDrag.sp-dy*.022));updCam();draw();}},{passive:false});
    nc.addEventListener('touchend',e=>{
      e.stopPropagation();
      const now=Date.now();
      if((now-ncLastTap<300)&&!(ncDrag&&ncDrag.moved)){togglePersp();}
      else if(ncDrag&&!ncDrag.moved){const p=getPos(e);const h=hitAxis(p.x,p.y);if(h>-1)snapTo(h);}
      ncLastTap=now;ncDrag=null;draw();
    });

    draw();return draw;
  }

  const nc=document.getElementById('navcube');window._ncDraw=setupNavCube(nc,nc.width,nc.height);
  const pnc=document.getElementById('pb-navcube');if(pnc)window._pbNcDraw=setupNavCube(pnc,pnc.width,pnc.height);
  window._pbNcReinit=function(){var c=document.getElementById('pb-navcube');if(c)window._pbNcDraw=setupNavCube(c,c.width,c.height);};
})();

// ================================================================
//  NAV JOYSTICK — pan joystick that swaps with NavCube in the nav slot
//
//  Behaviour:
//  - Touch/drag: knob follows finger, clamped to rim
//  - Single tap-release: one small pan step in the direction touched
//  - Hold: continuous pan while held, speed proportional to deflection
//  - Direction: always follows joystick push — right=cam-right, up=cam-up
//    Diagonal movement uses atan2 on the raw vector, no axis reversal
// ================================================================
(function(){
  let navShowJoy=false;

  // ── Reset view ───────────────────────────────────────────────────
  const CAM_DEFAULT={theta:-Math.PI/2,phi:Math.PI/2,radius:10};
  function resetView(){
    cam.theta=CAM_DEFAULT.theta;cam.phi=CAM_DEFAULT.phi;cam.radius=CAM_DEFAULT.radius;
    cam.target.set(0,0,0);updCam();toast('View reset');
  }
  ['nav-reset','pb-nav-reset'].forEach(function(id){
    const b=document.getElementById(id);if(b)b.addEventListener('click',resetView);
  });

  // ── Zoom +/− buttons ─────────────────────────────────────────────
  // Tap = one step (~5%). Hold = continuous zoom via RAF.
  const ZOOM_STEP=0.05; // fraction of current radius per tap
  const ZOOM_HOLD_DELAY=180; // ms before continuous starts
  function applyZoom(dir){
    // dir: +1 = zoom in (reduce radius), -1 = zoom out (increase radius)
    if(useOrtho){
      orthoZoom=Math.max(1,Math.min(50,orthoZoom*(1-dir*ZOOM_STEP)));
      syncOrtho();
    } else {
      cam.radius=Math.max(1,Math.min(40,cam.radius*(1-dir*ZOOM_STEP)));
    }
    updCam();markDirty();
  }
  function setupZoomBtn(inId,outId){
    [
      {id:inId,dir:1},
      {id:outId,dir:-1}
    ].forEach(function(cfg){
      const b=document.getElementById(cfg.id);
      if(!b)return;
      let rafId=null,holdTimer=null;
      function startZoom(e){
        e.preventDefault();e.stopPropagation();
        applyZoom(cfg.dir);
        holdTimer=setTimeout(function(){
          function loop(){applyZoom(cfg.dir);rafId=requestAnimationFrame(loop);}
          rafId=requestAnimationFrame(loop);
        },ZOOM_HOLD_DELAY);
      }
      function stopZoom(){
        clearTimeout(holdTimer);holdTimer=null;
        if(rafId){cancelAnimationFrame(rafId);rafId=null;}
      }
      b.addEventListener('mousedown',startZoom);
      b.addEventListener('touchstart',startZoom,{passive:false});
      b.addEventListener('mouseup',stopZoom);
      b.addEventListener('mouseleave',stopZoom);
      b.addEventListener('touchend',stopZoom);
      b.addEventListener('touchcancel',stopZoom);
    });
  }
  setupZoomBtn('nav-zoom-in','nav-zoom-out');
  setupZoomBtn('pb-nav-zoom-in','pb-nav-zoom-out');


  const PAN_SPEED=0.00035;  // world units per pixel deflection per frame, ×radius

  function setupJoy(el){
    if(!el)return;
    const ctx=el.getContext('2d');
    const W=el.width,H=el.height,CX=W/2,CY=H/2;
    const PAD_R=Math.min(W,H)/2-4;
    const KNOB_R=Math.min(W,H)*0.14;
    const MAX_D=PAD_R-KNOB_R-2;
    let active=false,kx=0,ky=0,rafId=null;

    function draw(){
      ctx.clearRect(0,0,W,H);
      ctx.save();
      // Rim
      ctx.strokeStyle='rgba(26,26,46,.15)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(CX,CY,PAD_R,0,Math.PI*2);ctx.stroke();
      // Crosshair
      ctx.strokeStyle='rgba(26,26,46,.08)';ctx.lineWidth=1;ctx.setLineDash([2,4]);
      ctx.beginPath();ctx.moveTo(CX,CY-PAD_R+5);ctx.lineTo(CX,CY+PAD_R-5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(CX-PAD_R+5,CY);ctx.lineTo(CX+PAD_R-5,CY);ctx.stroke();
      ctx.setLineDash([]);
      // Direction line when active
      if(active&&(kx!==0||ky!==0)){
        ctx.strokeStyle='rgba(26,26,46,.18)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+kx,CY+ky);ctx.stroke();
      }
      // Knob
      ctx.fillStyle=active?'rgba(26,26,46,.28)':'rgba(26,26,46,.12)';
      ctx.strokeStyle='rgba(26,26,46,.25)';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(CX+kx,CY+ky,KNOB_R,0,Math.PI*2);ctx.fill();ctx.stroke();
      // Idle hint arrows
      if(!active&&kx===0&&ky===0){
        ctx.strokeStyle='rgba(26,26,46,.12)';ctx.lineWidth=1;ctx.lineCap='round';
        [[0,-1],[0,1],[-1,0],[1,0]].forEach(function(d){
          const r=PAD_R-8;
          ctx.beginPath();ctx.moveTo(CX+d[0]*(r-5),CY+d[1]*(r-5));ctx.lineTo(CX+d[0]*r,CY+d[1]*r);ctx.stroke();
        });
      }
      ctx.restore();
    }

    function applyPan(dx,dy){
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<0.5)return;
      const sinT=Math.sin(cam.theta),cosT=Math.cos(cam.theta);
      const sinP=Math.sin(cam.phi),cosP=Math.cos(cam.phi);
      const rx=-sinT,ry=cosT; // camera right
      const fz=cosP,fy=sinP*sinT,fx=sinP*cosT;
      const ux=ry*fz,uy=-rx*fz,uz=rx*fy-ry*fx; // camera up
      const sc=cam.radius*PAN_SPEED;
      // dx>0 (joystick right) → scene right  → target += right  ✓
      // dy<0 (joystick up)    → scene up      → target += dy*up  (dy<0 → subtracts up → target lower → camera looks lower → scene moves up) ✓
      // dy>0 (joystick down)  → scene down    → target += dy*up  (dy>0 → adds up    → target higher → camera looks higher → scene moves down) ✓
      cam.target.x+=(dx*rx+dy*ux)*sc;
      cam.target.y+=(dx*ry+dy*uy)*sc;
      cam.target.z+=(dy*uz)*sc;
      updCam();
    }

    function clamp(dx,dy){
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>MAX_D)return{x:dx/d*MAX_D,y:dy/d*MAX_D};
      return{x:dx,y:dy};
    }

    function getPos(e){
      const r=el.getBoundingClientRect();
      const src=e.touches&&e.touches.length>0?e.touches[0]:e.changedTouches&&e.changedTouches.length>0?e.changedTouches[0]:e;
      return{x:src.clientX-r.left,y:src.clientY-r.top};
    }

    function onStart(e){
      e.preventDefault();e.stopPropagation();
      active=true;
      const p=getPos(e),c=clamp(p.x-CX,p.y-CY);
      kx=c.x;ky=c.y;
      // Immediate single step on touch-down
      applyPan(kx,ky);
      draw();
      if(rafId)cancelAnimationFrame(rafId);
      function loop(){
        if(!active)return;
        // Continue panning proportional to knob deflection
        if(kx!==0||ky!==0)applyPan(kx,ky);
        rafId=requestAnimationFrame(loop);
      }
      // Small delay before continuous — so a quick tap feels like one step
      setTimeout(function(){if(active)rafId=requestAnimationFrame(loop);},120);
    }
    function onMove(e){
      e.preventDefault();e.stopPropagation();
      if(!active)return;
      const p=getPos(e),c=clamp(p.x-CX,p.y-CY);
      kx=c.x;ky=c.y;draw();
    }
    function onEnd(e){
      e.stopPropagation();
      active=false;kx=0;ky=0;
      if(rafId){cancelAnimationFrame(rafId);rafId=null;}
      draw();
    }

    el.addEventListener('mousedown',onStart);
    el.addEventListener('mousemove',function(e){if(active)onMove(e);});
    el.addEventListener('mouseup',onEnd);
    el.addEventListener('mouseleave',onEnd);
    el.addEventListener('touchstart',onStart,{passive:false});
    el.addEventListener('touchmove',onMove,{passive:false});
    el.addEventListener('touchend',onEnd);
    el.addEventListener('touchcancel',onEnd);

    draw();
  }

  setupJoy(document.getElementById('navjoy'));
  setupJoy(document.getElementById('pb-navjoy'));
  window._pbJoyReinit=function(){setupJoy(document.getElementById('pb-navjoy'));};

  // ── Toggle NavCube ↔ Joystick ────────────────────────────────────
  function applyNavToggle(){
    const ids=[
      {nc:'navcube',jy:'navjoy',btn:'nav-toggle'},
      {nc:'pb-navcube',jy:'pb-navjoy',btn:'pb-nav-toggle'}
    ];
    ids.forEach(function(g){
      const nc=document.getElementById(g.nc);
      const jy=document.getElementById(g.jy);
      const btn=document.getElementById(g.btn);
      if(nc)nc.style.display=navShowJoy?'none':'block';
      if(jy)jy.style.display=navShowJoy?'block':'none';
      if(btn){btn.textContent=navShowJoy?'⬡ NAV':'✥ JOY';btn.classList.toggle('on',navShowJoy);}
    });
    if(!navShowJoy){if(window._ncDraw)window._ncDraw();if(window._pbNcDraw)window._pbNcDraw();}
  }

  function toggleNav(){navShowJoy=!navShowJoy;applyNavToggle();}
  window._applyNavToggle=applyNavToggle;
  const t1=document.getElementById('nav-toggle');if(t1)t1.addEventListener('click',toggleNav);
  const t2=document.getElementById('pb-nav-toggle');if(t2)t2.addEventListener('click',toggleNav);

  applyNavToggle();
})();

// ================================================================
//  NARROW CYCLE BUTTONS — plane / surf / axis
//  Tap = cycle to next. Long-press (400ms) = open popover upward.
//  Popover auto-dismisses on selection or outside tap.
// ================================================================
(function(){
  const PLANES=['xy','xz','yz'];
  const SURFS=['plane','cube','cylinder','sphere','cone','loft','none'];
  const SURF_LABELS={plane:'Pln',cube:'Cube',cylinder:'Cyl',sphere:'Sph',cone:'Cone',loft:'Lft',none:'Off'};
  const AXES=['all','x','y','z'];

  let openPop=null;

  function closeAllPops(){
    ['pop-plane','pop-surf','pop-axis','pop-mode','pop-plane2','pop-axis2','pop-surf2'].forEach(function(id){
      const p=document.getElementById(id);if(p)p.classList.remove('open');
    });
    openPop=null;
  }
  document.addEventListener('click',function(e){
    if(openPop&&!e.target.closest('.cyc-pop')&&!e.target.closest('.cyc-btn'))closeAllPops();
  });

  function positionPop(pop,btn){
    const br=btn.getBoundingClientRect();
    pop.style.bottom=(window.innerHeight-br.top+4)+'px';
    pop.style.left=Math.max(4,Math.min(br.left,window.innerWidth-pop.offsetWidth-4))+'px';
    pop.style.top='auto';
  }

  function openPop2(popId,btn){
    closeAllPops();
    const pop=document.getElementById(popId);if(!pop)return;
    pop.classList.add('open');
    openPop=popId;
    positionPop(pop,btn);
    // Mark current item
    pop.querySelectorAll('.cyc-pop-item').forEach(function(it){it.classList.remove('cur');});
  }

  function makeCycBtn(btnId,popId,getItems,getCur,applyCur,getLabel){
    const btn=document.getElementById(btnId);if(!btn)return;
    let holdTimer=null;
    function onStart(e){
      e.preventDefault();e.stopPropagation();
      holdTimer=setTimeout(function(){
        holdTimer=null;
        openPop2(popId,btn);
      },400);
    }
    function onEnd(e){
      e.stopPropagation();
      if(holdTimer){
        clearTimeout(holdTimer);holdTimer=null;
        // Short tap — cycle to next
        const items=getItems();const cur=getCur();
        const next=items[(items.indexOf(cur)+1)%items.length];
        applyCur(next);
        btn.textContent=getLabel(next);
        closeAllPops();
      }
    }
    btn.addEventListener('mousedown',onStart);
    btn.addEventListener('touchstart',onStart,{passive:false});
    btn.addEventListener('mouseup',onEnd);
    btn.addEventListener('touchend',onEnd);
    btn.addEventListener('mouseleave',function(){if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}});
    btn.addEventListener('touchcancel',function(){if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}});
  }

  // ── Plane cycle ──────────────────────────────────────────────────
  makeCycBtn('pb-cyc-plane','pop-plane',
    function(){return PLANES;},
    function(){return curPlane;},
    function(v){
      curPlane=v;
      document.querySelectorAll('[data-plane]').forEach(function(b){b.classList.toggle('on',b.dataset.plane===v);});
      if(surfFillMat)surfFillMat.color.setHex(SURF_TRACE);
      if(surfWireMat)surfWireMat.color.setHex(SURF_TRACE);
      syncSurf();
      const btn=document.getElementById('pb-cyc-plane');if(btn)btn.textContent=v.toUpperCase();
    },
    function(v){return v.toUpperCase();}
  );
  document.querySelectorAll('[data-cyc-plane]').forEach(function(it){
    it.addEventListener('click',function(){
      const v=this.dataset.cycPlane;
      curPlane=v;
      document.querySelectorAll('[data-plane]').forEach(function(b){b.classList.toggle('on',b.dataset.plane===v);});
      syncSurf();
      const btn=document.getElementById('pb-cyc-plane');if(btn)btn.textContent=v.toUpperCase();
      closeAllPops();
    });
  });

  // ── Shared surf type application — handles none/loft/standard ────
  // Exposed on window so bindings outside this IIFE (data-surf buttons) can call it
  function applySurfType(v){
    if(v==='none'){
      // Hide surface entirely — no drawing surface active
      surfType='none';
      surfGroup.visible=false;
      document.querySelectorAll('[data-surf]').forEach(function(b){b.classList.remove('on');});
      var bsurf=document.getElementById('bsurf');if(bsurf)bsurf.classList.remove('on');
      markDirty();
      toast('No active plane · drawing disabled');
      return;
    }
    if(v==='loft'){
      // Tap while already on loft with stored geo → clear it
      if(surfType==='loft' && window._loftGeo){
        if(window._clearLoft) window._clearLoft();
        return;
      }
      document.querySelectorAll('[data-surf]').forEach(function(b){b.classList.remove('on');});
      if(window._loftGeo){
        // Activate stored loft geometry
        if(window._activateLoft) window._activateLoft();
      } else {
        // No loft built yet — switch to select mode so user can pick strokes
        surfType='loft';
        surfGroup.visible=false;
        var bsurf2=document.getElementById('bsurf');if(bsurf2)bsurf2.classList.remove('on');
        markDirty();
        setMode('select');
        toast('Select 2+ strokes · then tap ⟁ Loft');
      }
      return;
    }
    // Standard surf types
    surfType=v;
    surfGroup.visible=true;
    var bsurf3=document.getElementById('bsurf');if(bsurf3)bsurf3.classList.add('on');
    document.querySelectorAll('[data-surf]').forEach(function(b){b.classList.toggle('on',b.dataset.surf===v);});
    buildSurf();
  }
  window._applySurfType=applySurfType;

  // ── Surface type cycle ───────────────────────────────────────────
  makeCycBtn('pb-cyc-surf','pop-surf',
    function(){return SURFS;},
    function(){return surfType;},
    function(v){
      applySurfType(v);
      const btn=document.getElementById('pb-cyc-surf');if(btn)btn.textContent=SURF_LABELS[v]||v;
    },
    function(v){return SURF_LABELS[v]||v;}
  );
  document.querySelectorAll('[data-cyc-surf]').forEach(function(it){
    it.addEventListener('click',function(){
      const v=this.dataset.cycSurf;
      applySurfType(v);
      const btn=document.getElementById('pb-cyc-surf');if(btn)btn.textContent=SURF_LABELS[v]||v;
      closeAllPops();
    });
  });

  // ── Axis cycle ───────────────────────────────────────────────────
  makeCycBtn('pb-cyc-axis','pop-axis',
    function(){return AXES;},
    function(){return document.getElementById('ga-all')&&document.getElementById('ga-all').classList.contains('on')?'all':['x','y','z'].find(function(a){const b=document.getElementById('ga-'+a);return b&&b.classList.contains('on');})||'all';},
    function(v){
      if(window._setAxisFilter)window._setAxisFilter(v);
      const btn=document.getElementById('pb-cyc-axis');if(btn)btn.textContent=v==='all'?'All':v.toUpperCase();
    },
    function(v){return v==='all'?'All':v.toUpperCase();}
  );
  document.querySelectorAll('[data-cyc-axis]').forEach(function(it){
    it.addEventListener('click',function(){
      const v=this.dataset.cycAxis;
      if(window._setAxisFilter)window._setAxisFilter(v);
      const btn=document.getElementById('pb-cyc-axis');if(btn)btn.textContent=v==='all'?'All':v.toUpperCase();
      closeAllPops();
    });
  });

  // ── Gizmo panel 4-button cycle row ───────────────────────────────
  // Helper: get current gizmo mode label
  function getGizmoModeLabel(m){return m==='move'?'Mv':m==='rotate'?'Rot':'Sc';}
  function getCurMode(){return window._getGizmoMode?window._getGizmoMode():'move';}

  // Mode button
  makeCycBtn('pb-cyc-mode','pop-mode',
    function(){return['move','rotate','scale'];},
    getCurMode,
    function(v){
      if(window._setGizmoMode)window._setGizmoMode(v);
      const btn=document.getElementById('pb-cyc-mode');if(btn)btn.textContent=getGizmoModeLabel(v);

function newScene(){
  // Reset strokes + undo
  clearAll();
  _redoStack.length=0;redoStack.length=0;
  // Reset pages
  pages.length=0;curPage=0;
  pages.push({strokes:[],thumb:null,views:[]});
  refreshPageStrip();refreshViewStrip();
  // Clear loft — dispose stored geometry
  if(window._loftGeo){window._loftGeo.dispose();window._loftGeo=null;}
  window._loftCen=null;
  // Reset surface to default plane XZ
  surfType='plane';curPlane='xz';
  surfPos.set(0,0,0);surfEuler.set(0,0,0);surfScale=1;surfScaleAxes.set(1,1,1);
  surfGroup.visible=true;
  buildSurf();
  document.querySelectorAll('[data-surf]').forEach(function(b){b.classList.toggle('on',b.dataset.surf==='plane');});
  document.querySelectorAll('[data-plane]').forEach(function(b){b.classList.toggle('on',b.dataset.plane==='xz');});
  // Sync surf cycle buttons back to Pln
  ['pb-cyc-surf','pb-cyc-surf2','sb-cyc-surf'].forEach(function(id){
    var b=document.getElementById(id);if(b)b.textContent='Pln';
  });
  var bsurf=document.getElementById('bsurf');if(bsurf)bsurf.classList.add('on');
  // Reset camera
  cam.theta=-Math.PI/2;cam.phi=Math.PI/2;cam.radius=10;cam.target.set(0,0,0);
  useOrtho=false;orthoZoom=8;
  document.querySelectorAll('#bpersp,#nav-persp,#pb-nav-persp').forEach(function(b){if(b)b.classList.remove('on');});
  updCam();
  // Reset bg color to beige
  setBgColor('#cdb899','beige');
  // Reset brush to defaults: size 1, opacity 95
  if(window._applySize) window._applySize(1);
  if(window._applyOpacity) window._applyOpacity(95);
  // Reset layers
  setActiveLayer(1);
  for(var i=0;i<4;i++){layerVisible[i]=true;}
  applyLayerVisibility();
  showMergeLayerRow(false);
  // Clear IDB autosave
  try{idbSave(JSON.stringify(sceneData()));}catch(e){}
  toast('New scene');
}

(function(){

  function drawSzCanvas(canvas,sz,color){
    if(!canvas)return;
    var ctx=canvas.getContext('2d');
    var W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    var r=Math.max(1,sz*0.42*Math.min(W,H)/20);
    ctx.beginPath();ctx.arc(W/2,H/2,r,0,Math.PI*2);
    ctx.fillStyle=color||'#1a1a2e';ctx.fill();
  }

  function drawOpCanvas(canvas,op100,color){
    if(!canvas)return;
    var ctx=canvas.getContext('2d');
    var W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    var pad=Math.max(2,Math.round(W*0.12));
    ctx.globalAlpha=op100/100;
    ctx.beginPath();ctx.arc(W/2,H/2,W/2-pad,0,Math.PI*2);
    ctx.fillStyle=color||'#1a1a2e';ctx.fill();
    ctx.globalAlpha=1;
  }

  function redrawAll(){
    var col='#1a1a2e'; // always black for visibility — never follows stroke color
    var op=Math.round(brushOp*100);
    drawSzCanvas(document.getElementById('sz-p1'),1,col);
    drawSzCanvas(document.getElementById('sz-p3'),3,col);
    drawSzCanvas(document.getElementById('sz-p6'),6,col);
    drawOpCanvas(document.getElementById('op-p30'),30,col);
    drawOpCanvas(document.getElementById('op-p60'),60,col);
    drawOpCanvas(document.getElementById('op-p95'),95,col);
    drawSzCanvas(document.getElementById('sz-p1-pb'),1,col);
    drawSzCanvas(document.getElementById('sz-p3-pb'),3,col);
    drawSzCanvas(document.getElementById('sz-p6-pb'),6,col);
    drawOpCanvas(document.getElementById('op-p30-pb'),30,col);
    drawOpCanvas(document.getElementById('op-p60-pb'),60,col);
    drawOpCanvas(document.getElementById('op-p95-pb'),95,col);
    drawSzCanvas(document.getElementById('sz-prev-pop'),brushSz,col);
    drawOpCanvas(document.getElementById('op-prev-pop'),op,col);
    document.querySelectorAll('[data-sz]').forEach(function(b){b.classList.toggle('cur',+b.dataset.sz===brushSz);});
    document.querySelectorAll('[data-op]').forEach(function(b){b.classList.toggle('cur',+b.dataset.op===op);});
  }
  window._brushRedraw=redrawAll;

  function applySize(v){
    v=Math.min(20,Math.max(1,+v));
    brushSz=v;
    var sld=document.getElementById('sz-sld');if(sld)sld.value=v;
    redrawAll();
  }
  function applyOpacity(v){
    v=Math.min(100,Math.max(10,+v));
    brushOp=v/100;
    var sld=document.getElementById('op-sld');if(sld)sld.value=v;
    redrawAll();
  }
  window._applySize=applySize;
  window._applyOpacity=applyOpacity;

  var openPopEl=null;
  function positionPop(pop,trigger){
    var br=trigger.getBoundingClientRect();
    var ph=pop.offsetHeight||120;
    var top=br.top>ph+12?br.top-ph-8:br.bottom+6;
    var left=Math.max(4,Math.min(br.left,window.innerWidth-pop.offsetWidth-4));
    pop.style.top=top+'px';pop.style.left=left+'px';
  }
  function openPop(pop,trigger){
    if(openPopEl&&openPopEl!==pop)openPopEl.classList.remove('open');
    redrawAll();pop.classList.add('open');openPopEl=pop;positionPop(pop,trigger);
  }
  function closePops(){if(openPopEl){openPopEl.classList.remove('open');openPopEl=null;}}
  document.addEventListener('click',function(e){
    if(openPopEl&&!openPopEl.contains(e.target)&&!e.target.closest('.bprev-more'))closePops();
  });

  document.querySelectorAll('[data-sz]').forEach(function(b){
    b.addEventListener('click',function(e){e.stopPropagation();applySize(+this.dataset.sz);closePops();});
  });
  document.querySelectorAll('[data-op]').forEach(function(b){
    b.addEventListener('click',function(e){e.stopPropagation();applyOpacity(+this.dataset.op);closePops();});
  });

  var szPop=document.getElementById('sz-pop');
  var opPop=document.getElementById('op-pop');
  ['sz-trig-sb','sz-trig-pb'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('click',function(e){e.stopPropagation();szPop.classList.contains('open')?closePops():openPop(szPop,this);});
  });
  ['op-trig-sb','op-trig-pb'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('click',function(e){e.stopPropagation();opPop.classList.contains('open')?closePops():openPop(opPop,this);});
  });

  var szSld=document.getElementById('sz-sld');
  if(szSld)szSld.addEventListener('input',function(){applySize(+this.value);});
  var opSld=document.getElementById('op-sld');
  if(opSld)opSld.addEventListener('input',function(){applyOpacity(+this.value);});

  redrawAll();
})();

// ================================================================
//  FLOAT CARD — narrow nav+gizmo panel system
// ================================================================

window._cardDetached=false;
window._cardHidden=false;

function _syncRenderer(){
  // Sync renderer canvas size + camera projection to current visualViewport dimensions.
  // Must be called any time layout changes (not just window resize) — the canvas has
  // explicit pixel dimensions from renderer.setSize; CSS inset:0 alone does not resize it.
  // In PWA standalone, narrow<->wide layout switches do not fire a window resize event.
  var _vvp=window.visualViewport;
  var vw=_vvp?_vvp.width:window.innerWidth;
  var vh=_vvp?_vvp.height:window.innerHeight;
  renderer.setSize(vw,vh);
  camera.aspect=vw/vh;
  camera.updateProjectionMatrix();
  syncOrtho();
  _refreshRect();
  markDirty();
}

function updateLayoutMode(){
  // Use visualViewport when available — gives correct dimensions in PWA standalone
  // before window.innerWidth/Height have settled after launch
  var _vvp=window.visualViewport;
  var _vw=_vvp?_vvp.width:window.innerWidth;
  var _vh=_vvp?_vvp.height:window.innerHeight;
  var isNarrow=_vw/_vh<(2/3);
  var isUiHidden=document.body.classList.contains('ui-hidden');
  var pb=document.getElementById('narrow-bar');
  var sc=document.getElementById('sidecol');
  var sb=document.getElementById('sbar');
  var card=document.getElementById('pb-float-card');
  var fab=document.getElementById('pb-fab');
  if(isNarrow){
    pb.classList.add('active');
    document.body.classList.add('narrow-mode');
    if(sc)sc.style.display='none';
    if(sb)sb.style.display='none';
    stab.style.display='none';
    _fcReparent();
    if(!window._fcEverActivated){
      window._fcEverActivated=true;
      // Only dock on first activation if UI is visible
      if(!isUiHidden){
        if(card)card.classList.add('fc-docked-bottom');
        var dockBtn2=document.getElementById('fc-dock-btn');
        if(dockBtn2)dockBtn2.textContent='✦';
      }
    }
    if(!window._cardHidden){
      if(card)card.classList.add('fc-visible');
      if(fab)fab.classList.remove('fab-visible');
    } else {
      if(fab)fab.classList.add('fab-visible');
    }
    setTimeout(function(){
      _syncRenderer();
      _fcResizeCanvases();
      var h=pb.getBoundingClientRect().height;
      document.documentElement.style.setProperty('--pb-h',h+'px');
    },50);
  } else {
    pb.classList.remove('active');
    document.body.classList.remove('narrow-mode');
    // Tablet mode: show float card only when UI is hidden
    if(isUiHidden){
      _fcReparent();
      if(!window._fcEverActivated){window._fcEverActivated=true;}
      if(!window._cardHidden){
        if(card)card.classList.add('fc-visible');
        if(fab)fab.classList.remove('fab-visible');
      } else {
        if(fab)fab.classList.add('fab-visible');
      }
      setTimeout(function(){_syncRenderer();_fcResizeCanvases();},50);
    } else {
      if(sc)sc.style.display='';
      if(sb)sb.style.display='';
      stab.style.display='';
      _fcReturn();
      if(card)card.classList.remove('fc-visible');
      if(fab)fab.classList.remove('fab-visible');
      window._cardHidden=false;
      document.documentElement.style.setProperty('--pb-h','0px');
      // Sync renderer after sidecol becomes visible — layout change doesn't fire resize in PWA
      setTimeout(_syncRenderer,50);
    }
  }
}

function _fcReparent(){
  var fcPanels=document.getElementById('fc-panels');
  var navPanel=document.getElementById('pb-panel-nav');
  var gizPanel=document.getElementById('pb-panel-gizmo');
  if(!fcPanels||!navPanel||!gizPanel)return;
  if(navPanel.parentNode!==fcPanels)fcPanels.appendChild(navPanel);
  if(gizPanel.parentNode!==fcPanels)fcPanels.appendChild(gizPanel);
  window._cardDetached=true;
}

function _fcReturn(){
  var pbPanels=document.getElementById('pb-panels');
  var navPanel=document.getElementById('pb-panel-nav');
  var gizPanel=document.getElementById('pb-panel-gizmo');
  if(!pbPanels||!navPanel||!gizPanel)return;
  if(navPanel.parentNode!==pbPanels)pbPanels.appendChild(navPanel);
  if(gizPanel.parentNode!==pbPanels)pbPanels.appendChild(gizPanel);
  window._cardDetached=false;
}

function _fcResizeCanvases(){
  if(window._cardDetached){
    var navPanel=document.getElementById('pb-panel-nav');
    var gizPanel=document.getElementById('pb-panel-gizmo');
    if(!navPanel||!gizPanel)return;
    var nw=navPanel.clientWidth-2;if(nw<60)nw=60;
    var nh=Math.round(nw*0.88);
    var nc=document.getElementById('pb-navcube');var nj=document.getElementById('pb-navjoy');
    if(nc){nc.width=nw;nc.height=nh;nc.style.width=nw+'px';nc.style.height=nh+'px';}
    if(nj){nj.width=nw;nj.height=nh;nj.style.width=nw+'px';nj.style.height=nh+'px';}
    var gw=gizPanel.clientWidth-6;if(gw<50)gw=50;
    var gh=Math.round(gw*0.80);
    var gc2=document.getElementById('pb-gc');
    if(gc2){gc2.width=gw;gc2.height=gh;gc2.style.width=gw+'px';gc2.style.height=gh+'px';}
    var hintRow=document.getElementById('pb-greset');
    if(hintRow&&hintRow.parentElement)hintRow.parentElement.style.width=gw+'px';
  } else {
    var navPanel2=document.getElementById('pb-panel-nav');
    var gizPanel2=document.getElementById('pb-panel-gizmo');
    if(navPanel2){
      var nw2=navPanel2.clientWidth-2;var nh2=Math.round(nw2*0.88);
      var nc2=document.getElementById('pb-navcube');var nj2=document.getElementById('pb-navjoy');
      if(nc2){nc2.width=nw2;nc2.height=nh2;nc2.style.width=nw2+'px';nc2.style.height=nh2+'px';}
      if(nj2){nj2.width=nw2;nj2.height=nh2;nj2.style.width=nw2+'px';nj2.style.height=nh2+'px';}
    }
    if(gizPanel2){
      var gw2=gizPanel2.clientWidth-6;var gh2=Math.round(gw2*0.80);
      var gc3=document.getElementById('pb-gc');
      if(gc3){gc3.width=gw2;gc3.height=gh2;gc3.style.width=gw2+'px';gc3.style.height=gh2+'px';}
      var hintRow2=document.getElementById('pb-greset');
      if(hintRow2&&hintRow2.parentElement)hintRow2.parentElement.style.width=gw2+'px';
    }
  }
  if(window._pbNcReinit)window._pbNcReinit();
  if(window._pbJoyReinit)window._pbJoyReinit();
  if(window._applyNavToggle)window._applyNavToggle();
  if(window._pbNcDraw)window._pbNcDraw();
  if(window._pbGcDraw)window._pbGcDraw();
}

// ── Narrow float card interactions ─────────────────────────────
(function(){
  var card=document.getElementById('pb-float-card');
  var handle=document.getElementById('fc-handle');
  var closeBtn=document.getElementById('fc-close');
  var dockBtn=document.getElementById('fc-dock-btn');
  var resizeEl=document.getElementById('fc-resize');
  var snapHint=document.getElementById('fc-snap-hint');
  var fab=document.getElementById('pb-fab');
  if(!card||!handle)return;

  var SNAP_DIST=12;
  var DEFAULT_W=Math.min(window.innerWidth-16,340);
  card.style.width=DEFAULT_W+'px';card.style.left='8px';card.style.top='52px';

  function isDocked(){return card.classList.contains('fc-docked-bottom');}
  function undock(){
    card.classList.remove('fc-docked-bottom');
    card.style.left=(window._fcLastLeft||8)+'px';
    card.style.top=(window._fcLastTop||52)+'px';
    card.style.width=(window._fcLastW||DEFAULT_W)+'px';
    card.style.right='';card.style.bottom='';
    if(dockBtn)dockBtn.textContent='⊞';
    setTimeout(_fcResizeCanvases,30);
  }
  function dockTo(edge){
    if(!isDocked()){
      window._fcLastLeft=parseInt(card.style.left)||8;
      window._fcLastTop=parseInt(card.style.top)||52;
      window._fcLastW=card.offsetWidth||DEFAULT_W;
    }
    card.classList.remove('fc-docked-bottom');
    if(edge==='bottom')card.classList.add('fc-docked-bottom');
    card.style.right='';card.style.bottom='';
    if(isDocked()&&window._fcNavResizeReset)window._fcNavResizeReset();
    if(dockBtn)dockBtn.textContent=isDocked()?'✦':'⊞';
    setTimeout(_fcResizeCanvases,30);
  }
  window._fcDockTo=dockTo;window._fcUndock=undock;
  if(dockBtn)dockBtn.addEventListener('click',function(e){e.stopPropagation();if(isDocked()){undock();}else if(!document.body.classList.contains('ui-hidden')){dockTo('bottom');}});

  var dragState=null;
  function snapEdge(nx,ny){
    // Never snap to bottom when UI is hidden — card must stay floating
    if(document.body.classList.contains('ui-hidden'))return null;
    var ch=card.offsetHeight,ih=window.innerHeight;
    var pbH=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pb-h'))||0;
    if(ny+ch>ih-pbH-SNAP_DIST)return'bottom';
    return null;
  }
  function onDragStart(e){
    if(e.target===closeBtn||e.target===dockBtn)return;
    if(isDocked())undock();
    e.preventDefault();
    var src=e.touches?e.touches[0]:e,r=card.getBoundingClientRect();
    dragState={ox:src.clientX-r.left,oy:src.clientY-r.top};
  }
  function onDragMove(e){
    if(!dragState)return;e.preventDefault();
    var src=e.touches?e.touches[0]:e;
    var nx=src.clientX-dragState.ox,ny=src.clientY-dragState.oy;
    var cw=card.offsetWidth,ch=card.offsetHeight;
    nx=Math.max(0,Math.min(window.innerWidth-cw,nx));
    ny=Math.max(0,Math.min(window.innerHeight-ch,ny));
    card.style.left=nx+'px';card.style.top=ny+'px';
    if(snapHint){if(snapEdge(nx,ny))snapHint.classList.add('show');else snapHint.classList.remove('show');}
  }
  function onDragEnd(){
    if(!dragState)return;
    var nx=parseInt(card.style.left)||0,ny=parseInt(card.style.top)||0;
    var edge=snapEdge(nx,ny);
    if(edge){dockTo(edge);}else{window._fcLastLeft=nx;window._fcLastTop=ny;window._fcLastW=card.offsetWidth;}
    if(snapHint)snapHint.classList.remove('show');
    dragState=null;
  }
  handle.addEventListener('touchstart',onDragStart,{passive:false});
  handle.addEventListener('touchmove',onDragMove,{passive:false});
  handle.addEventListener('touchend',onDragEnd);
  handle.addEventListener('mousedown',onDragStart);
  document.addEventListener('mousemove',function(e){if(dragState)onDragMove(e);});
  document.addEventListener('mouseup',function(){if(dragState)onDragEnd();});

  // Width resize — right edge
  var resizeState=null;
  function onResizeStart(e){
    if(isDocked())return;e.preventDefault();e.stopPropagation();
    var src=e.touches?e.touches[0]:e;
    resizeState={sx:src.clientX,sw:card.offsetWidth};
  }
  function onResizeMove(e){
    if(!resizeState)return;e.preventDefault();
    var src=e.touches?e.touches[0]:e;
    var nw=Math.max(200,Math.min(window.innerWidth-16,resizeState.sw+(src.clientX-resizeState.sx)));
    card.style.width=nw+'px';
    var cx=parseInt(card.style.left)||0;
    if(cx+nw>window.innerWidth)card.style.left=Math.max(0,window.innerWidth-nw)+'px';
    _fcResizeCanvases();
  }
  function onResizeEnd(){if(resizeState)window._fcLastW=card.offsetWidth;resizeState=null;_fcResizeCanvases();}
  if(resizeEl){
    resizeEl.addEventListener('touchstart',onResizeStart,{passive:false});
    resizeEl.addEventListener('touchmove',onResizeMove,{passive:false});
    resizeEl.addEventListener('touchend',onResizeEnd);
    resizeEl.addEventListener('mousedown',onResizeStart);
    document.addEventListener('mousemove',function(e){if(resizeState)onResizeMove(e);});
    document.addEventListener('mouseup',function(){if(resizeState)onResizeEnd();});
  }

  if(closeBtn)closeBtn.addEventListener('click',function(e){e.stopPropagation();card.classList.remove('fc-visible');window._cardHidden=true;if(fab)fab.classList.add('fab-visible');});

  var fabDrag=null;
  if(fab){
    fab.style.left='8px';fab.style.top='52px';
    fab.addEventListener('touchstart',function(e){var src=e.touches[0],r=fab.getBoundingClientRect();fabDrag={ox:src.clientX-r.left,oy:src.clientY-r.top,moved:false};},{passive:true});
    fab.addEventListener('touchmove',function(e){if(!fabDrag)return;e.preventDefault();fabDrag.moved=true;var src=e.touches[0];var nx=Math.max(0,Math.min(window.innerWidth-36,src.clientX-fabDrag.ox)),ny=Math.max(0,Math.min(window.innerHeight-36,src.clientY-fabDrag.oy));fab.style.left=nx+'px';fab.style.top=ny+'px';},{passive:false});
    fab.addEventListener('touchend',function(){if(fabDrag&&!fabDrag.moved){window._cardHidden=false;card.classList.add('fc-visible');fab.classList.remove('fab-visible');setTimeout(_fcResizeCanvases,30);}fabDrag=null;});
    fab.addEventListener('click',function(){window._cardHidden=false;card.classList.add('fc-visible');fab.classList.remove('fab-visible');setTimeout(_fcResizeCanvases,30);});
  }
})();

// ── Narrow nav inter-panel resize grip ──────────────────────────
(function(){
  var navGrip=document.getElementById('fc-nav-resize');
  var navPanel=document.getElementById('pb-panel-nav');
  var gizPanel=document.getElementById('pb-panel-gizmo');
  if(!navGrip||!navPanel||!gizPanel)return;
  var navState=null;
  function onStart(e){
    if(document.getElementById('pb-float-card').classList.contains('fc-docked-bottom'))return;
    e.preventDefault();e.stopPropagation();
    var src=e.touches?e.touches[0]:e;
    navState={sx:src.clientX,nw:navPanel.offsetWidth,gw:gizPanel.offsetWidth};
  }
  function onMove(e){
    if(!navState)return;e.preventDefault();
    var src=e.touches?e.touches[0]:e,dx=src.clientX-navState.sx,total=navState.nw+navState.gw;
    var newNw=Math.max(80,Math.min(total-80,navState.nw+dx));
    navPanel.style.flex='none';navPanel.style.width=newNw+'px';
    gizPanel.style.flex='none';gizPanel.style.width=(total-newNw)+'px';
    _fcResizeCanvases();
  }
  function onEnd(){navState=null;_fcResizeCanvases();}
  navGrip.addEventListener('touchstart',onStart,{passive:false});
  navGrip.addEventListener('touchmove',onMove,{passive:false});
  navGrip.addEventListener('touchend',onEnd);
  navGrip.addEventListener('mousedown',onStart);
  document.addEventListener('mousemove',function(e){if(navState)onMove(e);});
  document.addEventListener('mouseup',function(){if(navState)onEnd();});
  window._fcNavResizeReset=function(){navPanel.style.flex='';navPanel.style.width='';gizPanel.style.flex='';gizPanel.style.width='';};
})();

// ── Narrow float card: pinch-to-scale ───────────────────────────
// Two-finger pinch on the card scales its width proportionally.
// Canvases are resized via _fcResizeCanvases after each step.
// Works whether card is docked or floating.
(function(){
  var card=document.getElementById('pb-float-card');
  if(!card)return;
  var pinch=null; // {dist, w}
  function dist(t){
    var dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }
  card.addEventListener('touchstart',function(e){
    if(e.touches.length===2){
      e.preventDefault();
      pinch={dist:dist(e.touches),w:card.offsetWidth};
    }
  },{passive:false});
  card.addEventListener('touchmove',function(e){
    if(pinch&&e.touches.length===2){
      e.preventDefault();
      var scale=dist(e.touches)/pinch.dist;
      var nw=Math.round(pinch.w*scale);
      nw=Math.max(200,Math.min(window.innerWidth-16,nw));
      card.style.width=nw+'px';
      // Keep card on screen
      if(!card.classList.contains('fc-docked-bottom')){
        var cx=parseInt(card.style.left)||0;
        if(cx+nw>window.innerWidth)card.style.left=Math.max(0,window.innerWidth-nw)+'px';
      }
      if(window._fcResizeCanvases)window._fcResizeCanvases();
    }
  },{passive:false});
  card.addEventListener('touchend',function(e){
    if(e.touches.length<2){
      if(pinch){window._fcLastW=card.offsetWidth;}
      pinch=null;
    }
  });
  card.addEventListener('touchcancel',function(){pinch=null;});
})();

// Keyboard
window.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();duplicateSelected();return;}
  if(e.key==='Delete'||e.key==='Backspace'){if(selectedStrokes.length){e.preventDefault();deleteSelected();return;}}
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(document.activeElement.tagName==='INPUT')return;
  switch(e.key.toLowerCase()){
    case 'd':setMode('draw');break;case 'e':setMode('erase');break;case 'q':setMode('select');break;
    case 'g':setMode('pan');break;case 'r':setMode('orbit');break;
    case 'f':document.getElementById('sflat').click();break;
    case 'v':togglePersp();break;case 'x':document.getElementById('bdepth').click();break;
    case 'a':toggleAxis(!axisLinesOn);break;case 's':document.getElementById('ssmooth').click();break;
    case 'w':document.getElementById('svel').click();break;
    case 'p':expPNG();break;case 'h':document.getElementById('bhide').click();break;
    case 'escape':clearSelection();setMode(prevDrawMode);break;
  }
});

// Init
syncSurf();setMode('draw');
document.getElementById('bsurf').classList.add('on');

setActiveLayer(0);
updateGestLabel();updateLayoutMode();
// PWA standalone: viewport dimensions may not be final at script execution.
// Retry after paint and after system UI has settled to ensure correct narrow/wide layout.
setTimeout(updateLayoutMode,200);
setTimeout(updateLayoutMode,600);
// Restore from IndexedDB on load — uses _onIdbReady so it fires
// exactly when the DB is available, with localStorage fallback if DB fails
(function(){
  function doRestore(){
    idbLoad(function(saved){
      if(saved){try{var data=JSON.parse(saved);if(data.strokes&&data.strokes.length>0)loadAllPages(data);}catch(e){}}
    });
  }
  if(_idb){doRestore();}
  else{
    // Register callback — fires when DB opens (no fixed timeout)
    _onIdbReady(function(){doRestore();});
    // Fallback: if DB never opens (error/blocked), try localStorage after 2s
    setTimeout(function(){
      if(!_idb){
        try{var s=localStorage.getItem('sk3d_auto');if(s){var d=JSON.parse(s);if(d.strokes&&d.strokes.length>0)loadAllPages(d);}}catch(e){}
      }
    },2000);
  }
})();

function animate(){
  requestAnimationFrame(animate);
  if(_renderDirty||isDrawing||_hoverStroke){
    renderer.render(scene,activeCam());
    _renderDirty=false;
  }
}
animate();
